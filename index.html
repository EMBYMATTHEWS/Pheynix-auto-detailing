<section id="booking-form" class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 col-md-10">
                <div class="booking-container p-4 p-md-5">
                    <div class="text-center mb-5">
                        <h2 class="display-6 fw-bold text-uppercase" style="letter-spacing: 2px;">Inquiry & Schedule</h2>
                        <div class="mx-auto mt-2" style="width: 50px; height: 3px; background: var(--main-gold);"></div>
                    </div>

                    <form action="https://formspree.io/f/your_unique_id" method="POST" class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label text-secondary small text-uppercase fw-bold">Full Name</label>
                            <input type="text" name="name" class="form-control custom-input" placeholder="e.g. Emby Matthews" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label text-secondary small text-uppercase fw-bold">Email Address</label>
                            <input type="email" name="email" class="form-control custom-input" placeholder="name@email.com" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label text-secondary small text-uppercase fw-bold">Vehicle Details</label>
                            <input type="text" name="vehicle" class="form-control custom-input" placeholder="Year, Make, and Model" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label text-secondary small text-uppercase fw-bold">Service Notes / Availability</label>
                            <textarea name="message" class="form-control custom-input" rows="4" placeholder="Tell us about the vehicle's current condition and your preferred schedule..."></textarea>
                        </div>

                        <div class="col-12 text-center mt-5">
                            <input type="hidden" name="_subject" value="New $200 Detail Request">
                            <button type="submit" class="btn btn-gold-outline btn-lg px-5 py-3 text-uppercase">
                                Send Inquiry
                            </button>
                            <p class="mt-3 small text-muted italic" style="font-size: 0.7rem;">
                                *Submission does not guarantee a booking. We will contact you to confirm details and availability.
                            </p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer class="py-5 text-center border-top border-secondary mt-5" style="background: #0a0a0a;">
        <p class="text-secondary small mb-1">&copy; 2026 Emby-tronic Car Care</p>
        <p class="text-muted" style="font-size: 0.65rem; max-width: 600px; margin: 0 auto; padding: 0 20px;">
            Professional Detailing Services. All work subject to vehicle inspection. Emby-tronic is not liable for pre-existing conditions or mechanical issues.
        </p>
    </footer>
